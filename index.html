<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>米魂 KOMEDAMA</title>
  <meta name="description" content="米魂 KOMEDAMA | 日本の食を、あなたのもとへ。Japanese Food, Delivered to You.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white:     #FDFAF5;
      --cream:     #F5EFE0;
      --navy:      #1B2A4A;
      --green:     #2D5016;
      --gold:      #B8860B;
      --gray:      #8C8070;
    }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .bg-decoration {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-decoration::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(45,80,22,0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(192,57,43,0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 10%, rgba(184,134,11,0.06) 0%, transparent 35%);
    }
    .bg-decoration::after {
      content: '米魂';
      position: absolute;
      font-family: 'Shippori Mincho', serif;
      font-size: 40vw;
      font-weight: 800;
      color: rgba(27,42,74,0.03);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      line-height: 1;
      user-select: none;
      white-space: nowrap;
    }
    .lang-container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      animation: fadeUp 0.9s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lang-logo { margin-bottom: 32px; }
    .lang-logo img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 0;
      animation: float 4s ease-in-out infinite;
      box-shadow: 0 12px 40px rgba(27,42,74,0.15);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    .brand-name-ja {
      font-family: 'Shippori Mincho', serif;
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: 0.08em;
      display: block;
      line-height: 1;
    }
    .brand-name-en {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      color: var(--green);
      font-weight: 400;
      display: block;
      margin-top: 6px;
      text-transform: uppercase;
    }
    .lang-tagline {
      font-size: 0.82rem;
      color: var(--gray);
      letter-spacing: 0.1em;
      margin: 20px 0 40px;
      line-height: 1.9;
    }
    .lang-divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(to right, var(--green), var(--gold));
      margin: 0 auto 32px;
    }
    .lang-select-label {
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      color: var(--green);
      text-transform: uppercase;
      display: block;
      margin-bottom: 24px;
      font-weight: 500;
    }
    .lang-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .lang-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 200px;
      padding: 28px 24px;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }
    .lang-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.35s;
    }
    .lang-btn-ja {
      background: var(--white);
      color: var(--navy);
      border: 2px solid rgba(27,42,74,0.15);
      box-shadow: 0 8px 32px rgba(27,42,74,0.08);
    }
    .lang-btn-ja:hover {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(27,42,74,0.25);
    }
    .lang-btn-en {
      background: var(--white);
      color: var(--navy);
      border: 2px solid rgba(27,42,74,0.15);
      box-shadow: 0 8px 32px rgba(27,42,74,0.08);
    }
    .lang-btn-en:hover {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(27,42,74,0.25);
    }
    .btn-flag { font-size: 2rem; line-height: 1; display: block; }
    .btn-lang {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      display: block;
      position: relative;
      z-index: 1;
    }
    .lang-btn-en .btn-lang { font-family: 'Playfair Display', serif; }
    .btn-sub {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      opacity: 0.65;
      display: block;
      position: relative;
      z-index: 1;
    }
    .btn-arrow {
      font-size: 0.85rem;
      opacity: 0.5;
      display: block;
      margin-top: 4px;
      transition: transform 0.3s, opacity 0.3s;
      position: relative;
      z-index: 1;
    }
    .lang-btn:hover .btn-arrow { transform: translateX(4px); opacity: 1; }
    .lang-footer {
      margin-top: 48px;
      font-size: 0.68rem;
      color: var(--gray);
      letter-spacing: 0.08em;
      opacity: 0.7;
    }
    @media (max-width: 480px) {
      .lang-buttons { flex-direction: column; align-items: center; }
      .lang-btn { width: 260px; }
      .brand-name-ja { font-size: 2rem; }
      .lang-logo img { width: 96px; height: 96px; }
    }
  </style>
</head>
<body>
  <div class="bg-decoration" aria-hidden="true"></div>
  <div class="lang-container">
    <div class="lang-logo">
      <img src="images/logo/logo256px.png" alt="米魂 KOMEDAMA ロゴ">
    </div>
    <div class="lang-divider" aria-hidden="true"></div>
    <p class="lang-tagline">
      日本の食を、あなたのもとへ。<br>
      Japanese Food, Delivered to You.
    </p>
    <span class="lang-select-label">Select Language / 言語を選択</span>
    <div class="lang-buttons">
      <a href="ja/" class="lang-btn lang-btn-ja" lang="ja" hreflang="ja">
        <span class="btn-flag" aria-hidden="true">🇯🇵</span>
        <span class="btn-lang">日本語</span>
        <span class="btn-sub">Japanese</span>
        <span class="btn-arrow" aria-hidden="true">→</span>
      </a>
      <a href="en/" class="lang-btn lang-btn-en" lang="en" hreflang="en">
        <span class="btn-flag" aria-hidden="true">🌏</span>
        <span class="btn-lang">English</span>
        <span class="btn-sub">英語</span>
        <span class="btn-arrow" aria-hidden="true">→</span>
      </a>
    </div>
    <p class="lang-footer">© 2025 米魂 KOMEDAMA. All Rights Reserved.</p>
  </div>
</body>
</html>
